stances:
  support: "종북 세력 척결 등 국가 정상화를 위해 비상계엄 선포가 불가피한 조치였음을 옹호하거나 계엄의 절차적 정당성을 주장하는 입장"
  oppose: "비상계엄 선포를 명백한 헌법 위반 및 내란 행위로 규정하며, 대통령의 즉각적인 퇴진, 탄핵 소추 또는 관련자 처벌을 요구하는 입장"
