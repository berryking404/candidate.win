slug: opcon-transfer-2026
title_ko: 전시작전통제권(전작권) 전환 추진과 안보 논쟁 (2026)
title_en: OPCON Transfer Progress and Security Debate (2026)
category: foreign
status: ongoing
started_at: 2026-01-01
summary: |
  한미 양국이 2026년 내 미래연합군사령부의 2단계 검증인 FOC(완전운용능력) 마무리를 목표로
  전작권 전환에 박차를 가하고 있음. 우리 정부는 2028년을 최종 전환 목표로 제시하고 있으나,
  미측은 '조건 기초 전환' 원칙을 강조하며 신중론을 유지 중임. 북핵 위협 고도화에 따른
  억제력 약화 우려와 군사 주권 회복이라는 명분이 팽팽하게 맞서고 있음.
