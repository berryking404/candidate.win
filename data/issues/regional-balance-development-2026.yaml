summary: |
  수도권 집중 심화와 지방소멸 위기가 2026년 지방선거의 핵심 의제로 등장.
  역사문화산업과 첨단산업을 결합한 지역경제 전략, 특구 지정을 통한 기업 유치 등
  지역 주도 발전 모델이 제시되고 있으며, 정부의 지역균형발전 로드맵과 지방선거
  공약의 정합성을 두고 논쟁이 벌어지고 있음.
