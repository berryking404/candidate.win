slug: hormuz-blockade-us-reduction-2026
title_ko: 호르무즈 해협 봉쇄와 미군 감축 및 동맹국 압박 (2026)
title_en: Hormuz Strait Blockade, US Troop Reduction, and Pressure on Allies (2026)
category: foreign
status: ongoing
started_at: 2026-02-28
summary: |
  2026년 초 이란 전쟁 발발로 호르무즈 해협이 봉쇄되면서 글로벌 에너지 공급망이 마비됨.
  미국은 이란행 선박 차단 및 제3국 선박 구조를 위한 '프로젝트 프리덤'을 전개 중이며,
  동시에 트럼프 행정부는 파병 및 방위비 분담에 소극적인 동맹국들을 대상으로
  미군 감축을 위협하며 안보-통상 연계 전략을 강화하고 있음. 주한미군의 전략적 유연성 확대와
  한국의 호르무즈 파병 여부가 국내 안보의 핵심 쟁점으로 부상함.
