summary: |
  2025년 10.23 비상계엄 사태 이후 발의된 윤석열 대통령 탄핵 소추안과 김건희 여사의 도이치모터스 주가 조작, 명태균 게이트 등 각종 의혹을 규명하기 위한 특별검사 수사가 복합적으로 얽힌 정국 위기 상황. 헌법재판소의 탄핵 심판 절차와 특검의 고강도 수사가 병행되면서 여야 간의 극한 대립이 2026년까지 이어지고 있으며, 이는 대한민국 헌정사의 중대한 분수령이 되고 있음.
