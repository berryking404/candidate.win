stances:
  support: "군사 주권 회복을 위해 전작권 전환을 차질 없이 추진하고 한국군 주도의 연합방위체제를 조속히 구축해야 한다는 입장"
  oppose: "북핵 위협 등 안보 상황을 고려하여 전환 조건을 엄격히 따져야 하며 성급한 환수는 안보 공백을 초래할 수 있다는 입장"
