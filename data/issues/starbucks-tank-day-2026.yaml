summary: |
  2026년 5월 18일, 스타벅스 코리아가 5·18 민주화운동 기념일에 '탱크데이'라는 이름의 텀블러 할인 행사를 열고 홍보 문구로 "책상에 탁!"을 기용하면서 역사 폄훼 및 조롱 논란이 발생함.
  '탱크'는 민주화운동 진압군을 연상시키고, '책상에 탁!'은 1987년 박종철 고문치사 사건 당시 수사당국의 은폐 변명을 상기시켜 큰 사회적 공분을 샀음.
  이로 인해 스타벅스 불매운동이 전국적으로 일어나 결제액이 급감했고, 스타벅스 코리아 대표 해임과 정용진 신세계그룹 회장의 대국민 사과로 이어짐.
