summary: |
  2026년 2월, 쿠팡에서 약 3,367만 건의 고객 정보가 유출된 역대 최대 규모의 사고가 발생함.
  성명, 전화번호, 주소뿐만 아니라 공동현관 비밀번호까지 포함되어 심각한 사회적 파장이 일었으며,
  정부는 민관합동조사단을 구성해 조사에 착수함. 개인정보보호위원회의 역대급 과징금 부과 여부와
  미국 기업에 대한 차별적 규제라는 한미 통상 마찰 가능성이 주요 쟁점으로 부각됨.
