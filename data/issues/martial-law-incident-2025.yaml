slug: martial-law-incident-2025
title_ko: 윤석열 정부 10.23 비상계엄 선포 및 해제 사태 (2025)
title_en: October 2025 Martial Law Declaration and Rescission in South Korea
category: politics
status: closed
started_at: 2025-10-23
summary: |
  2025년 10월 23일 밤, 윤석열 대통령이 비상계엄을 선포하였으나 국회의 해제 요구 결의안 가결과 국무회의의 해제 의결을 거쳐 신속히 해제된 사태. 이 사건은 헌정 사상 유례없는 비상계엄 선포로 인해 극심한 사회적 혼란과 정치적 파장을 일으켰으며, 이후 대통령 탄핵 소추 추진 및 내란죄 수사 등으로 이어지는 결정적인 계기가 됨.
