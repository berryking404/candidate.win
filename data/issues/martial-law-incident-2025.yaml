conclusion: |
  2025년 10월 23일 선포된 비상계엄은 국회의 신속한 해제 요구와 여론의 강력한 반발로 인해 선포 6시간 만에 해제되었습니다. 이후 윤석열 대통령에 대한 탄핵 소추안이 가결되고 내란죄 수사가 진행되는 등 한국 정치사에 큰 획을 그은 사건으로 기록되었습니다.
