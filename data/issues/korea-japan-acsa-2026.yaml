slug: korea-japan-acsa-2026
title_ko: 한일 상호군수지원협정(ACSA) 논의 (2026)
title_en: South Korea-Japan Acquisition and Cross-Servicing Agreement Debate (2026)
category: foreign
status: ongoing
started_at: 2026-05-08
summary: |
  일본 측이 한일 안보협력의 다음 단계로 상호군수지원협정(ACSA) 체결을 거론하고, 2026년 5월 한일 국방장관 회담에서 관련 논의가 있었다는 사실이 공개되면서 국내 정치·안보 쟁점으로 부상했다. ACSA는 유사시 탄약·식량·연료 등 군수 물자와 용역을 상호 제공할 수 있게 하는 협정으로, 찬성·필요론은 북한 핵·미사일 위협, 한미일 안보협력, 유엔사 후방기지와 주일미군 지원 효율성을 강조한다. 반대·신중론은 일본 자위대의 한반도 관여 가능성, 과거사와 국민정서, 한미일 군사협력의 제도화에 따른 전쟁 연루 위험을 우려한다.
