summary: |
  정동영 통일부 장관의 대북 및 한미 관계 관련 발언이 논란이 된 가운데, 미국 측이 한국과의 정보 공유를 일시 중단했다는 소식이 전해지며 안보 위기론이 부각됨. 국민의힘은 이를 '동맹 파괴' 및 '안보 참사'로 규정하고 정 장관에 대한 해임 건의안을 발의하며 정국이 급랭하고 있음. 정부는 정보 공유 중단이 실무적 조정일 뿐이라고 해명하고 있으나, 야권과 보수 진영은 한미 동맹의 신뢰가 붕괴되었다며 강하게 반발하고 있음.
