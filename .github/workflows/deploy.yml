name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # lastmod 정확도를 위해 전체 히스토리

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.0"
          extended: true

      - name: Fetch Issue Status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 wiki/fetch_issues.py

      - name: Build
        working-directory: wiki
        run: hugo --minify --baseURL "https://wiki.candidate.win/"
        env:
          CANDYDATE_ISSUES_TOKEN: ${{ secrets.CANDYDATE_ISSUES_TOKEN }}

      - name: Index (Pagefind)
        working-directory: wiki
        run: npx pagefind@latest --site public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wiki/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
