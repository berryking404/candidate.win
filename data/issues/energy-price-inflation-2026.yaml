summary: |
  고유가·중동 정세 불안과 전기요금 현실화 필요성 사이에서 민생 부담이 가중되는
  상황. 전기요금 동결 정책이 산업 경쟁력 및 재정 건전성과 충돌하고 있으며,
  재생에너지 도매시장 입찰제 확대 등 구조 개편이 논의 중임. 유권자 조사에서
  '물가안정 및 지역경제 회복'이 지방선거 핵심 의제 1순위로 지목됨.
